name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.IONOS_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p ${{ secrets.IONOS_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            ./ ${{ secrets.IONOS_USER }}@${{ secrets.IONOS_HOST }}:/kunden/homepages/14/d4299624780/htdocs/sharondev/
